<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>E-commerce API Docs</title>

    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css" />

    <style>
        :root {
            --bg: #0b1220;
            --bg-soft: #111827;
            --card: #172033;
            --card-2: #1e293b;
            --border: #334155;
            --text: #e5edf8;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --post: #3b82f6;
            --get: #22c55e;
            --patch: #f59e0b;
            --put: #a855f7;
            --delete: #ef4444;
        }

        html, body {
            margin: 0;
            padding: 0;
            background:
                    radial-gradient(circle at top, rgba(56,189,248,0.08), transparent 30%),
                    linear-gradient(180deg, #0b1220 0%, #0f172a 100%);
            color: var(--text);
            font-family: Inter, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
        }

        .custom-header {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(8px);
            background: rgba(11,18,32,0.82);
            border-bottom: 1px solid rgba(148,163,184,0.15);
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .brand h1 {
            margin: 0;
            font-size: 20px;
            color: #f8fafc;
        }

        .brand p {
            margin: 0;
            font-size: 13px;
            color: var(--muted);
        }

        .header-badge {
            padding: 8px 12px;
            border: 1px solid rgba(56,189,248,0.35);
            background: rgba(56,189,248,0.1);
            color: #cbefff;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        #swagger-ui {
            padding: 18px;
        }

        .swagger-ui {
            background: transparent;
            color: var(--text);
        }

        .swagger-ui .wrapper {
            max-width: 1300px;
        }

        .swagger-ui .topbar {
            display: none;
        }

        .swagger-ui .scheme-container {
            background: transparent !important;
            box-shadow: none !important;
            padding: 0 !important;
            margin: 0 0 16px 0 !important;
        }

        .swagger-ui .info {
            margin: 0 0 20px 0;
            padding: 20px 22px;
            background: rgba(23,32,51,0.85);
            border: 1px solid rgba(148,163,184,0.14);
            border-radius: 20px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.25);
        }

        .swagger-ui .info .title,
        .swagger-ui .info hgroup.main h2,
        .swagger-ui .info p,
        .swagger-ui .info li,
        .swagger-ui,
        .swagger-ui .opblock-summary-path,
        .swagger-ui .opblock-summary-description,
        .swagger-ui .response-col_status,
        .swagger-ui .response-col_description,
        .swagger-ui .tab li,
        .swagger-ui label,
        .swagger-ui .parameter__name,
        .swagger-ui .parameter__type,
        .swagger-ui .parameter__deprecated,
        .swagger-ui .parameter__in,
        .swagger-ui .responses-inner h4,
        .swagger-ui .responses-inner h5,
        .swagger-ui .model-title,
        .swagger-ui .prop-type,
        .swagger-ui .prop-format,
        .swagger-ui .opblock-description-wrapper p,
        .swagger-ui .opblock-external-docs-wrapper p,
        .swagger-ui .opblock-title_normal p {
            color: var(--text) !important;
        }

        .swagger-ui .info .base-url {
            color: var(--muted) !important;
        }

        .swagger-ui .opblock-tag {
            margin: 28px 0 14px;
            padding: 10px 4px;
            border-bottom: 1px solid rgba(148,163,184,0.14);
            color: #f8fafc !important;
        }

        .swagger-ui .opblock {
            background: rgba(23,32,51,0.9);
            border: 1px solid rgba(148,163,184,0.14);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 28px rgba(0,0,0,0.20);
            margin-bottom: 18px;
        }

        .swagger-ui .opblock-summary {
            background: rgba(2,6,23,0.68);
            border-bottom: 1px solid rgba(148,163,184,0.14);
            padding: 8px 0;
        }

        .swagger-ui .opblock.opblock-get {
            border-left: 5px solid var(--get);
        }

        .swagger-ui .opblock.opblock-post {
            border-left: 5px solid var(--post);
        }

        .swagger-ui .opblock.opblock-patch {
            border-left: 5px solid var(--patch);
        }

        .swagger-ui .opblock.opblock-put {
            border-left: 5px solid var(--put);
        }

        .swagger-ui .opblock.opblock-delete {
            border-left: 5px solid var(--delete);
        }

        .swagger-ui .opblock-summary-method {
            border-radius: 999px;
            min-width: 82px;
            font-weight: 700;
        }

        .swagger-ui .btn,
        .swagger-ui .authorize {
            border-radius: 12px !important;
            border: 1px solid rgba(148,163,184,0.18) !important;
            transition: 0.2s ease;
        }

        .swagger-ui .authorize {
            background: rgba(56,189,248,0.10) !important;
            color: var(--text) !important;
            border: 1px solid rgba(56,189,248,0.35) !important;
        }

        .swagger-ui .authorize:hover,
        .swagger-ui .btn:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);
        }

        .swagger-ui .btn.try-out__btn {
            background: var(--accent) !important;
            color: #06131f !important;
            border: none !important;
        }

        .swagger-ui .btn.execute {
            background: var(--success) !important;
            color: #07140a !important;
            border: none !important;
        }

        .swagger-ui .btn.cancel {
            background: #334155 !important;
            color: var(--text) !important;
        }

        .swagger-ui input,
        .swagger-ui textarea,
        .swagger-ui select {
            background: #0b1220 !important;
            color: var(--text) !important;
            border: 1px solid rgba(148,163,184,0.18) !important;
            border-radius: 12px !important;
        }

        .swagger-ui textarea {
            min-height: 160px;
        }

        .swagger-ui .responses-inner,
        .swagger-ui .tab,
        .swagger-ui .model-box,
        .swagger-ui section.models {
            background: transparent !important;
        }

        .swagger-ui pre,
        .swagger-ui .microlight {
            background: #08111f !important;
            color: #dbeafe !important;
            border: 1px solid rgba(148,163,184,0.12);
            border-radius: 14px;
        }

        .swagger-ui .response-control-media-type__accept-message {
            color: var(--muted) !important;
        }

        .swagger-ui .dialog-ux {
            background: #111827 !important;
            border: 1px solid rgba(148,163,184,0.18) !important;
            border-radius: 18px !important;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        }

        .swagger-ui .dialog-ux .modal-ux-header {
            background: #0b1220 !important;
            border-bottom: 1px solid rgba(148,163,184,0.14) !important;
        }

        .swagger-ui .dialog-ux .modal-ux-content {
            background: #111827 !important;
        }

        .swagger-ui .dialog-ux .btn.modal-btn.auth {
            background: var(--accent) !important;
            color: #06131f !important;
        }

        .swagger-ui .dialog-ux .btn.modal-btn {
            color: var(--text) !important;
        }

        .swagger-ui .model-example {
            background: #08111f !important;
        }

        .swagger-ui .markdown p,
        .swagger-ui .markdown code,
        .swagger-ui .renderedMarkdown p,
        .swagger-ui .renderedMarkdown code {
            color: var(--text) !important;
        }

        .swagger-ui .responses-table .response-col_status {
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .custom-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            #swagger-ui {
                padding: 12px;
            }
        }
    </style>
</head>

<body>
<div class="custom-header">
    <div class="brand">
        <h1>🛒 E-commerce API</h1>
        <p>Documentação interativa • Dark Mode • JWT • Pedidos personalizados</p>

    <div class="header-badge">Java 17 • Spring Boot</div>
</div>

<div id="swagger-ui"></div>

<script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>

<script>
    const spec = {

            title: "E-commerce API",

                bearerAuth: {
                    type: "http",

                    bearerFormat: "JWT"

            schemas: {
                ErroResposta: {
                    type: "object",
                    properties: {
                        timestamp: { type: "string", example: "2026-03-29T16:10:00" },
                        status: { type: "integer", example: 404 },
                        erro: { type: "string", example: "Not Found" },
                        mensagem: { type: "string", example: "Produto não encontrado" },

            }
        },
        security: [
            { bearerAuth: [] }

        paths: {
            "/auth/login": {
                post: {
                    tags: ["Autenticação"],
                    summary: "Login",
                    requestBody: {
                        required: true,
                        content: {
                            "application/json": {
                                example: {
                                    username: "admin",
                                    password: "123"
                                }
                            }
                        }
                    },
                    responses: {
                        "200": {
                            description: "Login realizado com sucesso",

                            description: "Credenciais inválidas",
                            content: {

                                    example: {
                                        timestamp: "2026-03-29T16:10:00",
                                        status: 400,
                                        erro: "Bad Request",
                                        mensagem: "Senha inválida",
                                        path: "/auth/login"
                                    }
                                }
                            }
                        }
                    }
                }
            },

            "/pedidos": {

                    tags: ["Pedidos"],
                    summary: "Listar pedidos paginados",
                    parameters: [
                        { name: "page", in: "query", example: 0 },
                        { name: "size", in: "query", example: 5 },

                    responses: {

                },
                post: {
                    tags: ["Pedidos"],
                    summary: "Criar pedido",
                    requestBody: {
                        required: true,
                        content: {
                            "application/json": {
                                example: {
                                    cliente: {
                                        nome: "Gustavo",
                                        telefone: "71999999999",
                                        endereco: "Rua A, 123",
                                        bairroId: 1
                                    },
                                    observacao: "Entregar sem tocar a campainha. Apartamento 302.",
                                    itens: [
                                        {
                                            produtoId: 1,
                                            quantidade: 2,
                                            observacao: "Bem passado",
                                            acrescimos: [
                                                {

                                                },

                                                }
                                            ],
                                            remocoes: [
                                                { nome: "Tomate" }
                                            ]
                                        }
                                    ],
                                    cupomId: 1,
                                    formaPagamento: "PIX"
                                }
                            }
                        }
                    },
                    responses: {
                        "200": {
                            description: "Pedido criado com sucesso",
                            content: {
                                "application/json": {
                                    example: {
                                        id: 1,
                                        cliente: {
                                            nome: "Gustavo",
                                            telefone: "71999999999",
                                            endereco: "Rua A, 123",
                                            bairroId: 1
                                        },
                                        observacao: "Entregar sem tocar a campainha. Apartamento 302.",

                        "404": {

            "/pedidos/{id}": {

                    tags: ["Pedidos"],
